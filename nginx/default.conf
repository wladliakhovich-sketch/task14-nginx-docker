server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Главная страница
    location / {
        try_files $uri $uri/ =404;
    }

    # Redirect example
    location /redirect {
        return 301 http://localhost:8080/;
    }

    # Раздача изображений
    location /images/ {
        alias /usr/share/nginx/images/;
        autoindex on;
    }

    # Раздача музыки
    location /music/ {
        alias /usr/share/nginx/music/;
        autoindex on;
    }

    # Reverse proxy на backend контейнер
    location /app/ {
        proxy_pass http://app:80/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
